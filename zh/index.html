<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh" data-path="">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
  <link rel="canonical" href="https://benri-hub.com/zh/">
  <link rel="alternate" hreflang="ja" href="https://benri-hub.com/">
  <link rel="alternate" hreflang="en" href="https://benri-hub.com/en/">
  <link rel="alternate" hreflang="zh-CN" href="https://benri-hub.com/zh/">
  <link rel="alternate" hreflang="es" href="https://benri-hub.com/es/">
  <link rel="alternate" hreflang="fr" href="https://benri-hub.com/fr/">
  <link rel="alternate" hreflang="de" href="https://benri-hub.com/de/">
  <link rel="alternate" hreflang="x-default" href="https://benri-hub.com/">
  <title>BenriHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Noto+Sans+JP:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1c1c1c;
      --border: #272727;
      --accent: #c8b89a;
      --accent2: #e8d5b7;
      --text: #e8e2d8;
      --muted: #555;
      --muted2: #888;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      border-bottom: 1px solid var(--border);
      padding: 8px clamp(16px, 5vw, 48px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      min-height: 56px;
      gap: 12px;
    }

    .site-logo {
      display: inline-flex;
      align-items: center;
      position: relative;
      z-index: 1;
      font-family: 'Shippori Mincho', serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent2);
      letter-spacing: 0.1em;
      text-decoration: none;
      white-space: nowrap;
    }

    .logo-watermark {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    height: 150%;
    width: auto;
    opacity: 0.4;
    z-index: -1;
    pointer-events: none;
  }

    .site-logo span {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.55rem;
      font-weight: 400;
      color: var(--muted2);
      letter-spacing: 0.05em;
      margin-left: 8px;
      vertical-align: middle;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: clamp(12px, 3vw, 24px);
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .header-nav {
      display: flex;
      gap: 12px;
    }

    .header-nav a {
      font-size: 0.75rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .header-nav a:hover {
      color: var(--accent);
    }

    #lang-switcher {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .lang-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.6rem;
      padding: 3px 7px;
      border-radius: 2px;
      letter-spacing: 0.05em;
      transition: all 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
      white-space: nowrap;
      text-decoration: none;
    }

    .lang-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .lang-btn.active {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(200, 184, 154, 0.08);
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: clamp(56px, 10vw, 100px) 16px clamp(40px, 8vw, 72px);
      animation: fadeDown 0.7s ease both;
    }

    .hero-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 60px;
      position: relative;
      z-index: 1;
    }

    .hero-title::before {
      content: "";
      position: absolute;
      top: 50%;
      left: calc(50% - 0.9em);
      transform: translate(-50%, -50%);
      width: 2.5em;
      height: 2.5em;
      background: url("/images/favicon.png?v=1") no-repeat center;
      background-size: contain;
      opacity: 0.4;
      z-index: -1;
      pointer-events: none;
    }

    .hero-title {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 800;
      color: var(--accent2);
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 60px;
      position: relative;
      z-index: 1;
    }

    .hero-title::before {
      content: "";
      position: absolute;
      top: 50%;
      left: calc(50% - 0.9em);
      transform: translate(-50%, -50%);
      width: 2.5em;
      height: 2.5em;
      background: url("/images/favicon.png?v=1") no-repeat center;
      background-size: contain;
      opacity: 0.4;
      z-index: -1;
      pointer-events: none;
    }

    .hero-desc {
      font-size: clamp(0.82rem, 2vw, 0.92rem);
      color: var(--muted2);
      letter-spacing: 0.06em;
      line-height: 1.8;
    }

    .tools-section {
      position: relative;
      z-index: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 0 clamp(16px, 5vw, 48px) 80px;
    }

    .section-label {
      font-size: 0.63rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-bottom: 20px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .tool-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      animation: fadeUp 0.5s ease both;
      -webkit-tap-highlight-color: transparent;
    }

    .tool-card:hover {
      border-color: var(--accent);
      background: #222;
      transform: translateY(-2px);
    }

    .tool-card:active {
      transform: translateY(0);
    }

    .tool-icon {
      font-size: 1.8rem;
      line-height: 1;
    }

    .tool-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent2);
      letter-spacing: 0.05em;
    }

    .tool-desc {
      font-size: 0.78rem;
      color: var(--muted2);
      line-height: 1.6;
    }

    .tool-tag {
      display: inline-block;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 2px;
      margin-top: auto;
      width: fit-content;
    }

    .tool-card.soon {
      opacity: 0.38;
      pointer-events: none;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 20px clamp(16px, 5vw, 48px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .footer-copy {
      font-size: 0.63rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      font-size: 0.62rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    .footer-links a:hover {
      color: var(--accent);
    }

    .tool-card:nth-child(1) {
      animation-delay: 0.05s
    }

    .tool-card:nth-child(2) {
      animation-delay: 0.10s
    }

    .tool-card:nth-child(3) {
      animation-delay: 0.15s
    }

    .tool-card:nth-child(4) {
      animation-delay: 0.20s
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .beta-badge {
      display: inline-block;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 8px;
      font-weight: normal;
    }
  </style>
  <link rel="icon" href="/images/favicon.png?v=1" type="image/png">
  <link rel="apple-touch-icon" href="/images/favicon.png">
  <link rel="manifest" href="/manifest.json">
</head>

<body>
  <header>
    <a href="/zh/" class="site-logo"><img src="/images/favicon.png?v=1" alt="BenriHub Logo" class="logo-watermark">BenriHub<span>made by Japanese</span></a>
    <div class="header-right">
      <nav class="header-nav">
        <a href="/zh/about/" data-i18n="footer_about"></a>
        <a href="/zh/privacy/" data-i18n="footer_privacy"></a>
      </nav>
      <div id="lang-switcher"></div>
    </div>
  </header>
  <section class="hero">
    <div class="hero-label" data-i18n="hero_label"></div>
    <h1 class="hero-title" data-i18n="hero_title"></h1>
    <p class="hero-desc" data-i18n="hero_desc"></p>
  </section>
  <main class="tools-section">
    <div class="section-label" data-i18n="section_tools"></div>
    <div class="tools-grid">
      <a href="/zh/tools/qr/" class="tool-card">
        <div class="tool-icon">▦</div>
        <div class="tool-name" data-i18n="tool_qr_name"></div>
        <div class="tool-desc" data-i18n="tool_qr_desc"></div>
        <span class="tool-tag" data-i18n="tool_qr_tag"></span>
      </a>
      <a href="/zh/tools/unit/" class="tool-card">
        <div class="tool-icon">⇄</div>
        <div class="tool-name" data-i18n="tool_unit_name"></div>
        <div class="tool-desc" data-i18n="tool_unit_desc"></div>
        <span class="tool-tag" data-i18n="tool_unit_tag"></span>
      </a>
      <a href="/zh/tools/char/" class="tool-card">
        <div class="tool-icon">✎</div>
        <div class="tool-name" data-i18n="tool_char_name"></div>
        <div class="tool-desc" data-i18n="tool_char_desc"></div>
        <span class="tool-tag" data-i18n="tool_char_tag"></span>
      </a>
      <a href="/zh/tools/charcode/" class="tool-card">
        <div class="tool-icon">ℳ</div>
        <div class="tool-name" data-i18n="tool_charcode_name"></div>
        <div class="tool-desc" data-i18n="tool_charcode_desc"></div>
        <span class="tool-tag" data-i18n="tool_charcode_tag"></span>
      </a>
      <a href="/zh/tools/date/" class="tool-card d-animation" style="animation:fadeUp 0.6s ease both; animation-delay:0.3s;">
        <div class="tool-icon">📅</div>
        <div class="tool-name" data-i18n="tool_date_name"></div>
        <div class="tool-desc" data-i18n="tool_date_desc"></div>
        <span class="tool-tag" data-i18n="tool_date_tag"></span>
      </a>
    </div>
  </main>
  <footer>
    <span class="footer-copy" data-i18n="footer_copy"></span>
    <nav class="footer-links">
      <a href="/zh/about/" data-i18n="footer_about"></a>
      <a href="/zh/privacy/" data-i18n="footer_privacy"></a>
    </nav>
  </footer>
  <script src="/i18n.js"></script>
</body>

</html>
