<!DOCTYPE html>
<html lang="ja" data-lang="ja" data-path="tools/charcode/">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="入力した文字のUnicodeや10進数などをリアルタイム表示。">
<meta name="robots" content="index, follow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
<link rel="canonical" href="https://benri-hub.com/tools/charcode/">
<link rel="alternate" hreflang="ja" href="https://benri-hub.com/tools/charcode/">
<link rel="alternate" hreflang="en" href="https://benri-hub.com/en/tools/charcode/">
<link rel="alternate" hreflang="zh-CN" href="https://benri-hub.com/zh/tools/charcode/">
<link rel="alternate" hreflang="es" href="https://benri-hub.com/es/tools/charcode/">
<link rel="alternate" hreflang="fr" href="https://benri-hub.com/fr/tools/charcode/">
<link rel="alternate" hreflang="de" href="https://benri-hub.com/de/tools/charcode/">
<link rel="alternate" hreflang="x-default" href="https://benri-hub.com/tools/charcode/">
<title>文字コード確認 — BenriHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0f0f; --card:#1c1c1c; --border:#272727; --accent:#c8b89a; --accent2:#e8d5b7; --text:#e8e2d8; --muted:#555; --muted2:#888; --danger:#b94040; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
  header { position:relative; z-index:1; border-bottom:1px solid var(--border); padding:8px clamp(16px,5vw,48px); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; min-height:56px; gap:12px; }
  .site-logo {
      position: relative;
      z-index: 1; font-family:'Shippori Mincho',serif; font-size:1.1rem; font-weight:800; color:var(--accent2); letter-spacing:0.1em; text-decoration:none; white-space:nowrap; }
  .site-logo span { font-family:'Noto Sans JP',sans-serif; font-size:0.55rem; font-weight:400; color:var(--muted2); letter-spacing:0.05em; margin-left:8px; vertical-align:middle; }
  .header-right { display:flex; align-items:center; gap:clamp(12px, 3vw, 24px); flex-wrap:wrap; justify-content:flex-end; }
  .header-nav { display:flex; gap:12px; }
  .header-nav a { font-size:0.75rem; color:var(--text); text-decoration:none; letter-spacing:0.05em; transition:color 0.15s; white-space:nowrap; }
  .header-nav a:hover { color:var(--accent); }
  #lang-switcher { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
  .lang-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-size:0.6rem; padding:3px 7px; border-radius:2px; letter-spacing:0.05em; transition:all 0.15s; font-family:'Noto Sans JP',sans-serif; white-space:nowrap; text-decoration:none; }
  .lang-btn:hover { border-color:var(--accent); color:var(--accent); }
  .lang-btn.active { border-color:var(--accent); color:var(--accent2); background:rgba(200,184,154,0.08); }
  main { position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; padding:clamp(32px,6vw,64px) 16px; }
  .tool-wrap { width:100%; max-width:800px; animation:fadeUp 0.6s ease both; }
  .tool-label { font-size:0.63rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .tool-title { font-family:'Shippori Mincho',serif; font-size:clamp(1.4rem,5vw,1.8rem); font-weight:800; color:var(--accent2); letter-spacing:0.06em; margin-bottom:28px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:clamp(20px,6vw,32px); }
  .char-area { width:100%; min-height:100px; background:var(--bg); border:1px solid var(--border); border-radius:3px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:1rem; padding:14px; outline:none; transition:border-color 0.2s; resize:vertical; line-height:1.6; margin-bottom:12px; }
  .char-area:focus { border-color:var(--accent); }
  .btn-clear { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:2px; font-family:'Noto Sans JP',sans-serif; font-size:0.8rem; padding:8px 16px; cursor:pointer; transition:all 0.2s; margin-left:auto; display:block; }
  .btn-clear:hover { border-color:var(--danger); color:var(--danger); }
  
  .result-table-wrap { margin-top:24px; overflow-x:auto; border:1px solid var(--border); border-radius:3px; background:rgba(0,0,0,0.2); }
  .result-table { width:100%; border-collapse:collapse; text-align:left; font-size:0.85rem; }
  .result-table th { font-weight:500; font-size:0.75rem; letter-spacing:0.05em; color:var(--accent2); border-bottom:1px solid var(--border); padding:10px 14px; white-space:nowrap; background:rgba(255,255,255,0.02); }
  .result-table td { padding:10px 14px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle; white-space:nowrap; }
  .result-table tr:last-child td { border-bottom:none; }
  .char-cell { font-size:1.2rem; font-weight:600; min-width:48px; text-align:center; }
  .code-cell { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:#b5cdb8; letter-spacing:0.03em; }
  .dec-cell { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:#d2b8b8; letter-spacing:0.03em; }
  .empty-msg { padding:32px 16px; text-align:center; color:var(--muted2); font-size:0.85rem; letter-spacing:0.05em; }

  footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:16px clamp(16px,5vw,48px); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .footer-copy { font-size:0.62rem; color:var(--muted); }
  .footer-note { font-size:0.6rem; color:#333; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .beta-badge { display:inline-block; font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; border:1px solid var(--accent); color:var(--accent); padding:1px 5px; border-radius:2px; vertical-align:middle; margin-left:8px; font-weight:normal; }

  .logo-watermark {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    height: 160%;
    width: auto;
    opacity: 0.4;
    z-index: -1;
    pointer-events: none;
  }

  .mode-toggle { display: flex; gap: 16px; margin-bottom: 12px; }
  .mode-toggle label { display: flex; align-items: center; gap: 4px; font-size: 0.85rem; cursor: pointer; color: var(--muted); transition: color 0.2s; }
  .mode-toggle label:hover { color: var(--text); }
  .mode-toggle input[type="radio"] { accent-color: var(--accent); }
  .mode-toggle input[type="radio"]:checked + span { color: var(--accent2); font-weight: 500; }
  .invalid-cell { font-size:0.8rem; color:var(--danger); }
</style>
  <link rel="icon" href="/images/favicon.png?v=1" type="image/png">
</head>
<body>
<header>
  <a href="/" class="site-logo"><img src="/images/favicon.png?v=1" alt="BenriHub Logo" class="logo-watermark">BenriHub<span>made by Japanese</span></a>
  <div class="header-right">
    <nav class="header-nav">
      <a href="/about/" data-i18n="footer_about"></a>
      <a href="/privacy/" data-i18n="footer_privacy"></a>
    </nav>
    <div id="lang-switcher"></div>
  </div>
</header>
<main>
  <div class="tool-wrap">
    <div class="tool-label" data-i18n="tool_label"></div>
    <h1 class="tool-title" data-i18n="tool_charcode_title"></h1>
    <div class="card">
      
      <div class="mode-toggle">
        <label><input type="radio" name="mode" value="encode" checked> <span data-i18n="char_mode_encode"></span></label>
        <label><input type="radio" name="mode" value="decode"> <span data-i18n="char_mode_decode"></span></label>
      </div>
      <textarea id="char-input"
 class="char-area" data-i18n-ph="charcode_placeholder"></textarea>
      <button class="btn-clear" id="btn-clear" data-i18n="btn_clear"></button>

      <div class="result-table-wrap">
        <table class="result-table" id="result-table" style="display:none;">
          <thead>
            <tr>
              <th data-i18n="charcode_th_char"></th>
              <th data-i18n="charcode_th_hex"></th>
              <th data-i18n="charcode_th_dec"></th>
              <th data-i18n="charcode_th_utf8"></th>
            </tr>
          </thead>
          <tbody id="result-body"></tbody>
        </table>
        <div id="empty-msg" class="empty-msg" data-i18n="charcode_empty"></div>
      </div>
    </div>
  </div>
</main>
<footer>
  <span class="footer-copy" data-i18n="footer_copy"></span>
  <span class="footer-note" data-i18n="footer_note"></span>
</footer>
<script src="/i18n.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const inp = document.getElementById("char-input");
  const btnClear = document.getElementById("btn-clear");
  const resultTable = document.getElementById("result-table");
  const resultBody = document.getElementById("result-body");
  const emptyMsg = document.getElementById("empty-msg");

  const fullLang = document.documentElement.getAttribute("data-lang") || "ja";
  const lang = LANGS[fullLang] ? fullLang : fullLang.split('-')[0];
  const T = key => (LANGS[lang] && LANGS[lang][key]) || LANGS.ja[key] || key;
  inp.placeholder = T("charcode_placeholder");

  const getUTF8Hex = (str) => {
    const encoder = new TextEncoder();
    const arr = encoder.encode(str);
    return Array.from(arr).map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
  };

  
  const CTRL_NAMES = {
    0: "Null", 1: "Start of Heading", 2: "Start of Text", 3: "End of Text", 4: "End of Transmission", 5: "Enquiry", 6: "Acknowledge", 7: "Bell", 8: "Backspace", 9: "Tab", 10: "Line Feed", 11: "Vertical Tab", 12: "Form Feed", 13: "Carriage Return", 14: "Shift Out", 15: "Shift In", 16: "Data Link Escape", 17: "Device Control 1", 18: "Device Control 2", 19: "Device Control 3", 20: "Device Control 4", 21: "Negative Acknowledge", 22: "Synchronous Idle", 23: "End of Transmission Block", 24: "Cancel", 25: "End of Medium", 26: "Substitute", 27: "Escape", 28: "File Separator", 29: "Group Separator", 30: "Record Separator", 31: "Unit Separator", 127: "Delete"
  };

  const modeRadios = document.querySelectorAll("input[name=\"mode\"]");

  const getMode = () => Array.from(modeRadios).find(r => r.checked).value;

  const updateCodes = () => {
    let currentMode = getMode();
    inp.placeholder = currentMode === 'encode' ? T("charcode_placeholder") : T("charcode_decode_placeholder");

    const text = inp.value;
    if (!text) {
      resultTable.style.display = "none";
      emptyMsg.style.display = "block";
      resultBody.innerHTML = "";
      return;
    }

    resultTable.style.display = "table";
    emptyMsg.style.display = "none";
    let html = "";
    
    if (currentMode === 'encode') {
      for (const char of text) {
        const isSpace = char === ' ' || char === '\u3000';
        const isNewline = char === '\n' || char === '\r';
        if (isNewline) continue;
        
        const codePoint = char.codePointAt(0);
        const hex = codePoint.toString(16).toUpperCase().padStart(4, '0');
        const dec = codePoint.toString(10);
        const utf8 = getUTF8Hex(char);
        

        let displayChar = char;
        if (isSpace) {
          displayChar = "<span style=\"color:var(--muted2); font-size:0.7rem;\">(Space)</span>";
        } else if (codePoint < 32 || codePoint === 127) {
          const ctrlName = CTRL_NAMES[codePoint] || "Unknown";
          displayChar = "<span style=\"color:var(--muted2); font-size:0.75rem;\">" + T("charcode_ctrl").replace("{name}", ctrlName) + "</span>";
        }

        html += `<tr>
          <td class="char-cell">${displayChar}</td>
          <td class="code-cell">U+${hex}</td>
          <td class="dec-cell">${dec}</td>
          <td class="code-cell">${utf8}</td>
        </tr>`;
      }
    } else {
      const tokens = text.trim().split(/[\s,]+/);
      for (const token of tokens) {
        if (!token) continue;
        let code = NaN;
        const upperToken = token.toUpperCase();
        
        if (upperToken.startsWith('U+')) {
          code = parseInt(token.substring(2), 16);
        } else if (upperToken.startsWith('0X')) {
          code = parseInt(token.substring(2), 16);
        } else {
          code = parseInt(token, 10);
        }
        
        if (isNaN(code) || code < 0 || code > 0x10FFFF) {
           html += `<tr>
             <td class="char-cell invalid-cell">(Invalid)</td>
             <td class="code-cell">-</td>
             <td class="dec-cell">-</td>
             <td class="code-cell">-</td>
           </tr>`;
        } else {

           const char = String.fromCodePoint(code);
           const isSpace = char === " " || char === "\u3000";
           
           let displayChar = char;
           if (isSpace) {
             displayChar = "<span style=\"color:var(--muted2); font-size:0.7rem;\">(Space)</span>";
           } else if (code < 32 || code === 127) {
             const ctrlName = CTRL_NAMES[code] || "Unknown";
             displayChar = "<span style=\"color:var(--muted2); font-size:0.75rem;\">" + T("charcode_ctrl").replace("{name}", ctrlName) + "</span>";
           }

           const hex = code.toString(16).toUpperCase().padStart(4, "0");
           const dec = code.toString(10);
           const utf8 = getUTF8Hex(char);
           html += `<tr>
             <td class="char-cell">${displayChar}</td>
             <td class="code-cell">U+${hex}</td>
             <td class="dec-cell">${dec}</td>
             <td class="code-cell">${utf8}</td>
           </tr>`;
        }
      }
    }
    resultBody.innerHTML = html;
  };

  modeRadios.forEach(r => r.addEventListener("change", updateCodes));
  inp.addEventListener("input", updateCodes);

  btnClear.addEventListener("click", () => {
    inp.value = "";
    updateCodes();
    inp.focus();
  });
});
</script>
</body>
</html>
