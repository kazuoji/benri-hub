<!DOCTYPE html>
<html lang="ja" data-lang="ja" data-path="tools/qr/">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
<link rel="canonical" href="https://benri-hub.com/tools/qr/">
<link rel="alternate" hreflang="ja" href="https://benri-hub.com/tools/qr/">
<link rel="alternate" hreflang="en" href="https://benri-hub.com/en/tools/qr/">
<link rel="alternate" hreflang="zh-CN" href="https://benri-hub.com/zh/tools/qr/">
<link rel="alternate" hreflang="es" href="https://benri-hub.com/es/tools/qr/">
<link rel="alternate" hreflang="fr" href="https://benri-hub.com/fr/tools/qr/">
<link rel="alternate" hreflang="de" href="https://benri-hub.com/de/tools/qr/">
<link rel="alternate" hreflang="x-default" href="https://benri-hub.com/tools/qr/">
<title>QR — BenriHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  :root { --bg:#0f0f0f; --card:#1c1c1c; --border:#272727; --accent:#c8b89a; --accent2:#e8d5b7; --text:#e8e2d8; --muted:#555; --muted2:#888; --danger:#b94040; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
  header { position:relative; z-index:1; border-bottom:1px solid var(--border); padding:8px clamp(16px,5vw,48px); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; min-height:56px; gap:12px; }
  .site-logo { font-family:'Shippori Mincho',serif; font-size:1.1rem; font-weight:800; color:var(--accent2); letter-spacing:0.1em; text-decoration:none; white-space:nowrap; }
  .site-logo span { font-family:'Noto Sans JP',sans-serif; font-size:0.55rem; font-weight:400; color:var(--muted2); letter-spacing:0.05em; margin-left:8px; vertical-align:middle; }
  .header-right { display:flex; align-items:center; gap:clamp(12px, 3vw, 24px); flex-wrap:wrap; justify-content:flex-end; }
  .header-nav { display:flex; gap:12px; }
  .header-nav a { font-size:0.75rem; color:var(--text); text-decoration:none; letter-spacing:0.05em; transition:color 0.15s; white-space:nowrap; }
  .header-nav a:hover { color:var(--accent); }
  #lang-switcher { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
  .lang-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-size:0.6rem; padding:3px 7px; border-radius:2px; letter-spacing:0.05em; transition:all 0.15s; font-family:'Noto Sans JP',sans-serif; white-space:nowrap; text-decoration:none; }
  .lang-btn:hover { border-color:var(--accent); color:var(--accent); }
  .lang-btn.active { border-color:var(--accent); color:var(--accent2); background:rgba(200,184,154,0.08); }
  main { position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; padding:clamp(32px,6vw,64px) 16px; }
  .tool-wrap { width:100%; max-width:480px; animation:fadeUp 0.6s ease both; }
  .tool-label { font-size:0.63rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .tool-title { font-family:'Shippori Mincho',serif; font-size:clamp(1.4rem,5vw,1.8rem); font-weight:800; color:var(--accent2); letter-spacing:0.06em; margin-bottom:28px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:clamp(20px,6vw,32px); }
  .input-group { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  label { font-size:0.63rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
  .input-row { display:flex; gap:8px; }
  @media(max-width:360px){.input-row{flex-direction:column}.btn-generate{width:100%}}
  input[type="text"] { flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); border-radius:2px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:1rem; padding:12px 14px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; }
  input[type="text"]:focus { border-color:var(--accent); }
  input[type="text"].error { border-color:var(--danger); }
  .error-msg { font-size:0.7rem; color:var(--danger); min-height:1em; }
  .btn-generate { background:var(--accent); color:#0f0f0f; border:none; border-radius:2px; font-family:'Noto Sans JP',sans-serif; font-size:0.9rem; font-weight:500; padding:12px 20px; cursor:pointer; white-space:nowrap; transition:background 0.2s,transform 0.1s; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  .btn-generate:hover { background:var(--accent2); }
  .btn-generate:active { transform:scale(0.97); }
  .divider { border:none; border-top:1px solid var(--border); margin:24px 0 0; }
  .result { margin-top:28px; display:none; flex-direction:column; align-items:center; gap:18px; animation:fadeUp 0.4s ease both; }
  .result.visible { display:flex; }
  .qr-wrap { background:#fff; padding:clamp(12px,4vw,20px); border-radius:4px; line-height:0; }
  .qr-wrap canvas,.qr-wrap img { display:block; max-width:min(200px,calc(100vw - 120px)); height:auto; }
  .result-url { font-size:0.72rem; color:var(--muted2); word-break:break-all; text-align:center; }
  .btn-download { background:transparent; border:1px solid var(--accent); color:var(--accent); border-radius:2px; font-family:'Noto Sans JP',sans-serif; font-size:0.82rem; padding:11px 32px; cursor:pointer; transition:background 0.2s,color 0.2s; -webkit-tap-highlight-color:transparent; touch-action:manipulation; width:100%; max-width:240px; }
  .btn-download:hover,.btn-download:active { background:var(--accent); color:#0f0f0f; }
  footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:16px clamp(16px,5vw,48px); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .footer-copy { font-size:0.62rem; color:var(--muted); }
  .footer-note { font-size:0.6rem; color:#333; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .beta-badge { display:inline-block; font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; border:1px solid var(--accent); color:var(--accent); padding:1px 5px; border-radius:2px; vertical-align:middle; margin-left:8px; font-weight:normal; }

  .logo-watermark {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    height: 160%;
    width: auto;
    opacity: 0.4;
    z-index: -1;
    pointer-events: none;
  }
</style>
  <link rel="icon" href="/images/favicon.png?v=1" type="image/png">
</head>
<body>
<header>
  <a href="/" class="site-logo"><img src="/images/favicon.png?v=1" alt="BenriHub Logo" class="logo-watermark">BenriHub<span>made by Japanese</span></a>
  <div class="header-right">
    <nav class="header-nav">
      <a href="/about/" data-i18n="footer_about"></a>
      <a href="/privacy/" data-i18n="footer_privacy"></a>
    </nav>
    <div id="lang-switcher"></div>
  </div>
</header>
<main>
  <div class="tool-wrap">
    <div class="tool-label" data-i18n="tool_label"></div>
    <h1 class="tool-title" data-i18n="tool_title"></h1>
    <div class="card">
      <div class="input-group">
        <label for="url-input" data-i18n="input_label"></label>
        <div class="input-row">
          <input type="text" id="url-input" placeholder="https://example.com"
                 autocomplete="off" autocorrect="off" autocapitalize="off"
                 spellcheck="false" inputmode="url">
          <button class="btn-generate" data-i18n="btn_generate" onclick="generate()"></button>
        </div>
        <div class="error-msg" id="error-msg" role="alert" aria-live="polite"></div>
      </div>
      <hr class="divider">
      <div class="result" id="result">
        <div class="qr-wrap" id="qr-wrap"></div>
        <div class="result-url" id="result-url"></div>
        <button class="btn-download" data-i18n="btn_download" onclick="dlQR()"></button>
      </div>
    </div>
  </div>
</main>
<footer>
  <span class="footer-copy" data-i18n="footer_copy"></span>
  <span class="footer-note" data-i18n="footer_note"></span>
</footer>
<div id="qr-hidden" style="display:none"></div>
<script src="/i18n.js"></script>
<script>
const PAD=20;
const LANG=document.documentElement.getAttribute('data-lang')||'ja';
function T(k){return(LANGS[LANG]&&LANGS[LANG][k])||LANGS.ja[k]||k;}
document.getElementById('url-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();generate();}});
function sanitizeURL(raw){
  const s=raw.trim();
  if(!s)return{ok:false,msg:T('err_empty')};
  let p;
  try{p=new URL(/^https?:\/\//i.test(s)?s:'https://'+s);}catch{return{ok:false,msg:T('err_invalid')};}
  if(!['http:','https:'].includes(p.protocol))return{ok:false,msg:T('err_protocol')};
  const h=p.hostname.toLowerCase();
  if(['localhost','127.0.0.1','0.0.0.0','::1'].includes(h))return{ok:false,msg:T('err_local')};
  if(/^(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(h))return{ok:false,msg:T('err_private')};
  return{ok:true,url:p.href};
}
function generate(){
  const inp=document.getElementById('url-input');
  const err=document.getElementById('error-msg');
  const res=document.getElementById('result');
  const{ok,url,msg}=sanitizeURL(inp.value);
  if(!ok){inp.classList.add('error');err.textContent=msg;res.classList.remove('visible');return;}
  inp.classList.remove('error');err.textContent='';inp.value=url;
  document.getElementById('qr-wrap').innerHTML='';
  document.getElementById('qr-hidden').innerHTML='';
  const opts={text:url,width:200,height:200,colorDark:'#1a1a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H};
  new QRCode(document.getElementById('qr-wrap'),opts);
  new QRCode(document.getElementById('qr-hidden'),opts);
  document.getElementById('result-url').textContent=url;
  res.classList.add('visible');
  setTimeout(()=>res.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}
function dlQR(){
  const h=document.getElementById('qr-hidden');
  const c=h.querySelector('canvas'),i=h.querySelector('img');
  const save=s=>{
    const w=s.naturalWidth||s.width||200,ht=s.naturalHeight||s.height||200;
    const o=document.createElement('canvas');o.width=w+PAD*2;o.height=ht+PAD*2;
    const ctx=o.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,o.width,o.height);
    ctx.drawImage(s,PAD,PAD,w,ht);
    const a=document.createElement('a');a.download='qrcode.png';a.href=o.toDataURL('image/png');a.click();
  };
  if(c)save(c);else if(i){i.complete?save(i):(i.onload=()=>save(i));}
}
</script>
</body>
</html>
