<!DOCTYPE html>
<html lang="ja" data-lang="ja" data-path="about/">
<head>
<meta charset="UTF-8">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
<link rel="canonical" href="https://benri-hub.com/about/">
<link rel="alternate" hreflang="ja" href="https://benri-hub.com/about/">
<link rel="alternate" hreflang="en" href="https://benri-hub.com/en/about/">

<title>About — BenriHub</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0f0f; --border:#272727; --accent:#c8b89a; --accent2:#e8d5b7; --text:#e8e2d8; --muted:#555; --muted2:#888; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; line-height:1.8; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
  header { position:relative; z-index:1; border-bottom:1px solid var(--border); padding:8px clamp(16px,5vw,48px); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; min-height:56px; gap:12px; }
  .site-logo {
      position: relative;
      z-index: 1; font-family:'Shippori Mincho',serif; font-size:1.1rem; font-weight:800; color:var(--accent2); letter-spacing:0.1em; text-decoration:none; white-space:nowrap; }
  .site-logo span { font-family:'Noto Sans JP',sans-serif; font-size:0.55rem; font-weight:400; color:var(--muted2); letter-spacing:0.05em; margin-left:8px; vertical-align:middle; }
  .header-right { display:flex; align-items:center; gap:clamp(12px, 3vw, 24px); flex-wrap:wrap; justify-content:flex-end; }
  .header-nav { display:flex; gap:12px; }
  .header-nav a { font-size:0.75rem; color:var(--text); text-decoration:none; letter-spacing:0.05em; transition:color 0.15s; white-space:nowrap; }
  .header-nav a:hover { color:var(--accent); }
  #lang-switcher { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
  .lang-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-size:0.6rem; padding:3px 7px; border-radius:2px; letter-spacing:0.05em; transition:all 0.15s; font-family:'Noto Sans JP',sans-serif; white-space:nowrap; text-decoration:none; }
  .lang-btn:hover { border-color:var(--accent); color:var(--accent); }
  .lang-btn.active { border-color:var(--accent); color:var(--accent2); background:rgba(200,184,154,0.08); }
  main { position:relative; z-index:1; flex:1; max-width:680px; width:100%; margin:0 auto; padding:clamp(40px,8vw,72px) clamp(16px,5vw,48px) 80px; animation:fadeUp 0.6s ease both; }
  .page-label { font-size:0.63rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .page-title { font-family:'Shippori Mincho',serif; font-size:clamp(1.6rem,5vw,2.2rem); font-weight:800; color:var(--accent2); letter-spacing:0.06em; margin-bottom:40px; }
  .section { margin-bottom:40px; }
  .section h2 { font-family:'Shippori Mincho',serif; font-size:1rem; font-weight:600; color:var(--accent); border-left:2px solid var(--accent); padding-left:12px; margin-bottom:14px; }
  .section p { font-size:0.88rem; color:var(--muted2); line-height:1.9; margin-bottom:10px; }
  .values { display:flex; flex-direction:column; gap:12px; }
  .value-item { display:flex; gap:14px; align-items:flex-start; }
  .value-icon { font-size:1rem; line-height:1.9; flex-shrink:0; }
  .value-text { font-size:0.88rem; color:var(--muted2); line-height:1.8; }
  .value-text strong { color:var(--text); font-weight:500; }
  .cta { display:inline-block; margin-top:32px; background:transparent; border:1px solid var(--accent); color:var(--accent); border-radius:2px; font-family:'Noto Sans JP',sans-serif; font-size:0.82rem; padding:11px 28px; text-decoration:none; letter-spacing:0.1em; transition:background 0.2s,color 0.2s; }
  .cta:hover { background:var(--accent); color:#0f0f0f; }
  footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:16px clamp(16px,5vw,48px); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .footer-copy { font-size:0.62rem; color:var(--muted); }
  .footer-links { display:flex; gap:16px; }
  .footer-links a { font-size:0.62rem; color:var(--muted); text-decoration:none; }
  .footer-links a:hover { color:var(--accent); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .beta-badge { display:inline-block; font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; border:1px solid var(--accent); color:var(--accent); padding:1px 5px; border-radius:2px; vertical-align:middle; margin-left:8px; font-weight:normal; }

  .logo-watermark {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    height: 150%;
    width: auto;
    opacity: 0.4;
    z-index: -1;
    pointer-events: none;
  }
</style>
  <link rel="icon" href="/images/favicon.png?v=1" type="image/png">
  <link rel="apple-touch-icon" href="/images/favicon.png">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
<header>
  <a href="/" class="site-logo"><img src="/images/favicon.png?v=1" alt="BenriHub Logo" class="logo-watermark">BenriHub<span>made by Japanese</span></a>
  <div class="header-right">
    <nav class="header-nav">
      <a href="/about/" data-i18n="footer_about"></a>
      <a href="/privacy/" data-i18n="footer_privacy"></a>
    </nav>
    <div id="lang-switcher"></div>
  </div>
</header>
<main>
  <div class="page-label" data-i18n="about_label"></div>
  <h1 class="page-title" data-i18n="about_title"></h1>
  <div class="section">
    <h2 data-i18n="about_h1"></h2>
    <p data-i18n="about_p1"></p>
    <p data-i18n="about_p2"></p>
  </div>
  <div class="section">
    <h2 data-i18n="about_h2"></h2>
    <div class="values">
      <div class="value-item"><span class="value-icon">◎</span><span class="value-text"><strong data-i18n="about_v1_title"></strong>　<span data-i18n="about_v1_desc"></span></span></div>
      <div class="value-item"><span class="value-icon">◎</span><span class="value-text"><strong data-i18n="about_v2_title"></strong>　<span data-i18n="about_v2_desc"></span></span></div>
      <div class="value-item"><span class="value-icon">◎</span><span class="value-text"><strong data-i18n="about_v4_title"></strong>　<span data-i18n="about_v4_desc"></span></span></div>
    </div>
  </div>
  <div class="section">
    <h2 data-i18n="about_h3"></h2>
    <p data-i18n="about_p3"></p>
  </div>
  <a href="/" class="cta" data-i18n="about_cta"></a>
</main>
<footer>
  <span class="footer-copy" data-i18n="footer_copy"></span>
  <nav class="footer-links">
    <a href="/about/" data-i18n="footer_about"></a>
    <a href="/privacy/" data-i18n="footer_privacy"></a>
  </nav>
</footer>
<script src="/i18n.js"></script>
</body>
</html>
